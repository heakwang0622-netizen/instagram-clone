name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Show loaded SSH key fingerprint
        run: |
          ssh-add -l || true

      - name: Verify SSH connection
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "[verify] attempt ${i}/3"
            if ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "echo ssh-ok"; then
              exit 0
            fi
            sleep 3
          done
          echo "[verify] SSH auth failed after retries. Running verbose diagnostics..."
          ssh -vvv -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "echo ssh-ok" || true
          exit 1

      - name: Create deploy.sh on server if missing
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
          set -euo pipefail
          APP_DIR="/var/www/kwangsta.it.com"
          mkdir -p "$APP_DIR"
          if [ ! -f "$APP_DIR/deploy.sh" ]; then
            cat > "$APP_DIR/deploy.sh" << 'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          APP_DIR="/var/www/kwangsta.it.com"
          cd "$APP_DIR"
          git pull origin main
          cd frontend
          npm run build
          cd ..
          pip install -r backend/requirements.txt
          cd backend
          alembic upgrade head
          cd ..
          sudo systemctl restart kwangsta-backend
          SCRIPT
            chmod +x "$APP_DIR/deploy.sh"
          fi
          EOF

      - name: Run deploy script
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "bash /var/www/kwangsta.it.com/deploy.sh"
